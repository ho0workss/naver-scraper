name: 경쟁사 가격 수집 → Google Sheets

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 KST 09:00
    # 매일 KST 09:00 원하면: '0 0 * * *'
  workflow_dispatch:       # Actions 탭에서 수동 실행 버튼

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 패키지 설치
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: 스크래퍼 실행
        run: python src/naver_scraper.py --output competitor_latest.xlsx

      - name: Google Sheets 업로드
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID:     ${{ secrets.SPREADSHEET_ID }}
        run: python src/notify.py competitor_latest.xlsx
